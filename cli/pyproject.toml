[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "modellable"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "click>=8.1",
    "lark>=1.1",
    "pydantic>=2.0",
    "rich>=13.0",
    "jsonschema>=4.23",
    "referencing>=0.35",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
modellable = "modellable.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/modellable"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["src/modellable"]
