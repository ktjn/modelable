[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "modelable"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "click>=8.1",
    "lark>=1.1",
    "pydantic==2.13.4",
    "rich>=13.0",
    "jsonschema>=4.23",
    "referencing>=0.35",
    "pygls>=2.1.1,<3",
    "psycopg[binary]>=3.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "build>=1.2",
]

[project.scripts]
modelable = "modelable.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/modelable"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/modelable"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-lsp>=1.0.0",
]
