scenario: ecommerce-data-warehouse
title: "E-commerce Analytics Data Warehouse"
platform: data-warehouse
description: |
  A high-traffic e-commerce marketplace (millions of orders/day) feeds a ClickHouse
  analytics warehouse with customer lifetime value, acquisition-cohort revenue curves,
  checkout-funnel conversion rates, and multi-touch campaign attribution.

  Cross-domain joins span the customer, commerce, and payments domains. PII fields
  (email, phone) are pseudonymised via HMAC before landing in the warehouse so analysts
  can build cross-channel identity graphs without exposure to raw personal data.

  Pre-aggregated cohort summaries run on a nightly schedule to keep dashboard query
  costs bounded regardless of data volume growth.
complexity: high
tags: [analytics, ecommerce, clickhouse, ltv, cohort, funnel, attribution, pii-masking]

---
domain: customer
owner: customer-platform-team
contact: customer-platform@example.com
description: Customer identity, lifecycle, loyalty tier, and acquisition attribution.
policies:
  defaultClassification: internal
  piiHandling: pseudonymise_before_export
  retentionYears: 7

---
domain: commerce
owner: commerce-team
contact: commerce@example.com
description: Order lifecycle, checkout funnel, line items, and campaign attribution.
policies:
  defaultClassification: internal
  retentionYears: 10

---
domain: payments
owner: payments-team
contact: payments@example.com
description: Payment authorisation, capture, refund, and chargeback records.
policies:
  defaultClassification: confidential
  piiHandling: strict_masking
  retentionYears: 7

---
domain: analytics
owner: data-platform-team
contact: data-platform@example.com
description: Analytics projections and materialised summaries for business intelligence.

---
domain: customer
model: Customer
kind: entity
version: 3
status: published
description: Canonical customer identity and lifecycle record.

identity:
  key: customerId

fields:
  customerId:
    type: uuid
    required: true
  email:
    type: string
    format: email
    classification: pii
    required: true
  phoneNumber:
    type: string
    classification: pii
    nullable: true
  fullName:
    type: string
    classification: pii
    required: true
  countryCode:
    type: string
    format: iso3166_alpha2
    required: true
  acquisitionChannel:
    type: enum
    values: [organic, email, paid_search, social, referral, direct, affiliate]
    nullable: true
  acquisitionDate:
    type: date
    nullable: true
  firstCampaignId:
    type: string
    nullable: true
    description: UTM campaign identifier at first touch.
  loyaltyTier:
    type: enum
    values: [bronze, silver, gold, platinum]
    nullable: true
  status:
    type: enum
    values: [active, suspended, deleted]
    required: true
  createdAt:
    type: timestamp
    required: true
  updatedAt:
    type: timestamp
    required: true

---
domain: commerce
model: Order
kind: event
version: 4
status: published
description: Represents a customer order at any stage of its lifecycle.

identity:
  key: orderId

fields:
  orderId:
    type: uuid
    required: true
  customerId:
    type: uuid
    required: true
    references:
      domain: customer
      model: Customer
      field: customerId
  status:
    type: enum
    values: [pending, confirmed, shipped, delivered, cancelled, refunded]
    required: true
  checkoutFunnelStep:
    type: enum
    values: [cart, address, payment_entry, payment_confirm, confirmed]
    description: Furthest funnel step reached; preserved even after status changes.
  subtotalCents:
    type: integer
    required: true
  discountCents:
    type: integer
    required: true
    default: 0
  shippingCents:
    type: integer
    required: true
    default: 0
  taxCents:
    type: integer
    required: true
    default: 0
  totalAmountCents:
    type: integer
    required: true
  currencyCode:
    type: string
    format: iso4217
    required: true
  channelCode:
    type: enum
    values: [web, mobile_ios, mobile_android, api, in_store]
    required: true
  campaignId:
    type: string
    nullable: true
    description: Last-touch UTM campaign identifier at order time.
  couponCode:
    type: string
    nullable: true
  itemCount:
    type: integer
    required: true
  createdAt:
    type: timestamp
    required: true
  confirmedAt:
    type: timestamp
    nullable: true
  shippedAt:
    type: timestamp
    nullable: true
  deliveredAt:
    type: timestamp
    nullable: true
  cancelledAt:
    type: timestamp
    nullable: true

---
domain: commerce
model: OrderLineItem
kind: entity
version: 2
status: published
description: Individual product line within an order.

identity:
  key: lineItemId

fields:
  lineItemId:
    type: uuid
    required: true
  orderId:
    type: uuid
    required: true
    references:
      domain: commerce
      model: Order
      field: orderId
  productId:
    type: string
    required: true
  productCategory:
    type: string
    nullable: true
  productBrand:
    type: string
    nullable: true
  unitPriceCents:
    type: integer
    required: true
  quantity:
    type: integer
    required: true
  discountCents:
    type: integer
    required: true
    default: 0
  lineTotalCents:
    type: integer
    required: true

---
domain: payments
model: PaymentTransaction
kind: event
version: 2
status: published
description: A payment attempt or settlement tied to an order.

identity:
  key: transactionId

fields:
  transactionId:
    type: uuid
    required: true
  orderId:
    type: uuid
    required: true
    references:
      domain: commerce
      model: Order
      field: orderId
  customerId:
    type: uuid
    required: true
  amountCents:
    type: integer
    required: true
  currencyCode:
    type: string
    format: iso4217
    required: true
  paymentMethod:
    type: enum
    values: [card, bank_transfer, wallet, buy_now_pay_later, crypto, gift_card]
    required: true
  cardBin:
    type: string
    classification: confidential
    nullable: true
    description: First 6 digits of the card number for BIN-level analytics.
  cardIssuerCountry:
    type: string
    format: iso3166_alpha2
    nullable: true
  processorName:
    type: string
    nullable: true
  status:
    type: enum
    values: [pending, authorised, captured, declined, refunded, chargeback]
    required: true
  declineCode:
    type: string
    nullable: true
  processorFeesCents:
    type: integer
    nullable: true
  createdAt:
    type: timestamp
    required: true
  settledAt:
    type: timestamp
    nullable: true

---
domain: analytics
projection: CustomerLifetimeValue
version: 2
status: published
description: |
  SCD Type 1 customer dimension enriched with lifetime order and payment signals.
  Email is HMAC-pseudonymised before landing in the warehouse so analysts can join
  across channels without accessing raw PII. Grouped aggregates collapse all orders
  and captured payments per customer into a single row that is upserted on each change.

sources:
  - domain: customer
    model: Customer
    version: 3
    alias: cust
  - domain: commerce
    model: Order
    version: 4
    alias: ord
    joinOn:
      left: cust.customerId
      right: ord.customerId
    joinType: left
  - domain: payments
    model: PaymentTransaction
    version: 2
    alias: pay
    joinOn:
      left: ord.orderId
      right: pay.orderId
    joinType: left

identity:
  key: customerId

fields:
  customerId:
    from: cust.customerId
  emailHash:
    expression: "hmac_sha256(cust.email, env.PII_HMAC_SECRET)"
    type: string
    description: HMAC-SHA256 pseudonymised email for cross-channel identity joins.
  countryCode:
    from: cust.countryCode
  acquisitionChannel:
    from: cust.acquisitionChannel
  acquisitionDate:
    from: cust.acquisitionDate
  firstCampaignId:
    from: cust.firstCampaignId
  loyaltyTier:
    from: cust.loyaltyTier
  customerStatus:
    from: cust.status
  accountCreatedAt:
    from: cust.createdAt
  totalOrderCount:
    expression: "count(ord.orderId)"
    type: integer
  completedOrderCount:
    expression: "countif(ord.status == 'delivered')"
    type: integer
  cancelledOrderCount:
    expression: "countif(ord.status in ['cancelled', 'refunded'])"
    type: integer
  lifetimeRevenueCents:
    expression: "sum(pay.amountCents) where pay.status == 'captured'"
    type: integer
  lifetimeProcessorFeesCents:
    expression: "sum(pay.processorFeesCents) where pay.status == 'captured'"
    type: integer
    nullable: true
  avgOrderValueCents:
    expression: "avg(ord.totalAmountCents) where ord.status == 'delivered'"
    type: integer
    nullable: true
  firstOrderDate:
    expression: "min(ord.confirmedAt)"
    type: timestamp
    nullable: true
  lastOrderDate:
    expression: "max(ord.confirmedAt)"
    type: timestamp
    nullable: true
  daysSinceLastOrder:
    expression: "date_diff('day', max(ord.confirmedAt), now())"
    type: integer
    nullable: true
  preferredChannel:
    expression: "mode(ord.channelCode)"
    type: string
    nullable: true
  preferredPaymentMethod:
    expression: "mode(pay.paymentMethod) where pay.status == 'captured'"
    type: string
    nullable: true
  hasCancelledInLast90Days:
    expression: "countif(ord.status == 'cancelled' && date_diff('day', ord.cancelledAt, now()) <= 90) > 0"
    type: boolean

groupBy:
  - cust.customerId
  - cust.email
  - cust.countryCode
  - cust.acquisitionChannel
  - cust.acquisitionDate
  - cust.firstCampaignId
  - cust.loyaltyTier
  - cust.status
  - cust.createdAt

materialisation:
  strategy: upsert
  key: customerId
  partitionBy: acquisitionDate
  granularity: month
  binding: clickhouse-analytics-sink
  targetTable: customer_lifetime_value
  engine: ReplacingMergeTree
  orderBy: [customerId]

---
domain: analytics
projection: OrderFunnelFacts
version: 1
status: published
description: |
  Append-only fact table capturing every order event with the funnel step reached.
  Records are never updated — each status change produces a new row preserving the
  full historical trajectory. Analysts can reconstruct step-by-step conversion rates
  and measure where shoppers drop off without relying on current-state snapshots.

sources:
  - domain: commerce
    model: Order
    version: 4
    alias: ord

fields:
  orderId:
    from: ord.orderId
  customerId:
    from: ord.customerId
  eventTimestamp:
    expression: "coalesce(ord.cancelledAt, ord.deliveredAt, ord.shippedAt, ord.confirmedAt, ord.createdAt)"
    type: timestamp
  funnelStep:
    from: ord.checkoutFunnelStep
  orderStatus:
    from: ord.status
  channelCode:
    from: ord.channelCode
  campaignId:
    from: ord.campaignId
  couponCode:
    from: ord.couponCode
  currencyCode:
    from: ord.currencyCode
  totalAmountCents:
    from: ord.totalAmountCents
  discountCents:
    from: ord.discountCents
  itemCount:
    from: ord.itemCount
  revenueDate:
    expression: "truncate(coalesce(ord.confirmedAt, ord.createdAt), 'day')"
    type: date

materialisation:
  strategy: append
  deduplicationKey: [orderId, orderStatus]
  partitionBy: revenueDate
  granularity: day
  binding: clickhouse-analytics-sink
  targetTable: order_funnel_facts
  engine: MergeTree
  orderBy: [revenueDate, orderId]

---
domain: analytics
projection: DailyCohortRevenue
version: 1
status: published
description: |
  Nightly pre-aggregated cohort revenue summary keyed by customer acquisition month,
  revenue date, channel, and country. Enables cohort retention curves and week-N LTV
  charts at sub-second query latency without scanning the raw order fact table.

sources:
  - domain: commerce
    model: Order
    version: 4
    alias: ord
  - domain: customer
    model: Customer
    version: 3
    alias: cust
    joinOn:
      left: ord.customerId
      right: cust.customerId

fields:
  cohortMonth:
    expression: "truncate(cust.acquisitionDate, 'month')"
    type: date
  revenueDate:
    expression: "truncate(ord.confirmedAt, 'day')"
    type: date
  acquisitionChannel:
    from: cust.acquisitionChannel
  countryCode:
    from: cust.countryCode
  channelCode:
    from: ord.channelCode
  uniqueCustomers:
    expression: "count_distinct(ord.customerId)"
    type: integer
  orderCount:
    expression: "count(ord.orderId)"
    type: integer
  totalRevenueCents:
    expression: "sum(ord.totalAmountCents)"
    type: integer
  totalDiscountCents:
    expression: "sum(ord.discountCents)"
    type: integer
  avgOrderValueCents:
    expression: "avg(ord.totalAmountCents)"
    type: integer

filter:
  expression: "ord.status == 'delivered' && cust.acquisitionDate != null"

groupBy:
  - cohortMonth
  - revenueDate
  - acquisitionChannel
  - countryCode
  - channelCode

materialisation:
  strategy: overwrite_partition
  partitionBy: revenueDate
  granularity: day
  schedule: "0 3 * * *"
  binding: clickhouse-analytics-sink
  targetTable: daily_cohort_revenue
  engine: SummingMergeTree
  orderBy: [cohortMonth, revenueDate, acquisitionChannel, countryCode]

---
domain: analytics
projection: ProductRevenueAttribution
version: 1
status: published
description: |
  Append-only line-item fact joining orders and their line items for product-level
  revenue attribution. Supports category, brand, and campaign attribution analysis.

sources:
  - domain: commerce
    model: OrderLineItem
    version: 2
    alias: li
  - domain: commerce
    model: Order
    version: 4
    alias: ord
    joinOn:
      left: li.orderId
      right: ord.orderId

filter:
  expression: "ord.status in ['confirmed', 'shipped', 'delivered']"

fields:
  lineItemId:
    from: li.lineItemId
  orderId:
    from: li.orderId
  customerId:
    from: ord.customerId
  productId:
    from: li.productId
  productCategory:
    from: li.productCategory
  productBrand:
    from: li.productBrand
  campaignId:
    from: ord.campaignId
  channelCode:
    from: ord.channelCode
  currencyCode:
    from: ord.currencyCode
  quantity:
    from: li.quantity
  unitPriceCents:
    from: li.unitPriceCents
  lineTotalCents:
    from: li.lineTotalCents
  lineDiscountCents:
    from: li.discountCents
  orderDate:
    expression: "truncate(ord.confirmedAt, 'day')"
    type: date

materialisation:
  strategy: append
  deduplicationKey: lineItemId
  partitionBy: orderDate
  granularity: day
  binding: clickhouse-analytics-sink
  targetTable: product_revenue_attribution
  engine: MergeTree
  orderBy: [orderDate, productId]

---
binding: clickhouse-analytics-sink
adapter: clickhouse
role: sink
config:
  host: clickhouse.analytics.internal
  port: 8443
  database: modellable_analytics
  tls: true
  username: modellable_writer
  passwordSecret: clickhouse-analytics-write-password
  batchSize: 10000
  flushIntervalMs: 5000
  connectTimeoutMs: 5000
  queryTimeoutMs: 30000
  maxRetries: 3
  retryBackoffMs: 1000

---
binding: kafka-commerce-source
adapter: kafka
role: stream
config:
  brokers:
    - kafka-1.internal:9092
    - kafka-2.internal:9092
    - kafka-3.internal:9092
  tls: true
  saslMechanism: SCRAM-SHA-512
  credentialSecret: kafka-analytics-consumer-creds
  replicationFactor: 3
  retentionMs: 2592000000
  compressionType: lz4
  consumerGroup: analytics-warehouse-consumer
  maxPollRecords: 2000
  autoOffsetReset: earliest
