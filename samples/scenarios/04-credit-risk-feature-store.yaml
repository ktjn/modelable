scenario: credit-risk-feature-store
title: "Credit Risk ML Feature Store"
platform: ml-feature-store
description: |
  A consumer lending platform's credit risk team trains and serves a credit scoring
  model using features derived from four source domains: customer financials,
  loan application history, credit bureau snapshots, and historical repayment behaviour.

  The central challenge is point-in-time (PIT) correctness: training features must
  reflect the value of each signal as it existed at the moment a loan decision was
  made — not its current value. Using today's credit score to label a decision from
  18 months ago leaks future information into training data and inflates model accuracy.

  Modellable addresses this by materialising versioned offline snapshots with explicit
  snapshotAt timestamps. The online serving projection is kept current within seconds
  via Kafka; the offline training snapshot is rebuilt nightly from the same projection
  definition, guaranteeing training/serving consistency.

  Bureau data carries heavy PII and sensitive classifications. A dedicated anonymised
  projection strips direct identifiers and applies aggregation transforms before any
  bureau signals reach model artefacts exported outside the ML platform.
complexity: high
tags: [ml, credit-risk, feature-store, feast, pit-correct, pii, training-serving-consistency]

---
domain: ml-credit-risk
owner: credit-risk-ml-team
contact: credit-risk@example.com
description: Credit risk feature definitions, training snapshots, and model serving projections.
policies:
  defaultClassification: confidential
  piiHandling: strict_masking
  retentionYears: 7

---
domain: customer
owner: customer-platform-team
contact: customer-platform@example.com
description: Customer identity, employment status, and declared financial profile.
policies:
  defaultClassification: internal
  piiHandling: pseudonymise_before_export

---
domain: lending
owner: lending-team
contact: lending@example.com
description: Loan applications, approval decisions, and repayment events.
policies:
  defaultClassification: confidential
  retentionYears: 10

---
domain: credit-bureau
owner: data-partnerships-team
contact: data-partnerships@example.com
description: Third-party credit bureau report snapshots ingested via secure file transfer.
policies:
  defaultClassification: sensitive
  piiHandling: strict_masking
  retentionYears: 7
  externalDataProvider: true

---
domain: customer
model: CustomerFinancials
kind: aggregate
version: 2
status: published
description: |
  Aggregated financial profile for a customer: declared income, employment type,
  bank account signals, and open credit lines. Updated when a customer updates
  their profile or when a new account linkage is verified.

identity:
  key: customerId

fields:
  customerId:
    type: uuid
    required: true
  declaredAnnualIncomeCents:
    type: integer
    classification: sensitive
    nullable: true
  employmentStatus:
    type: enum
    values: [employed_full_time, employed_part_time, self_employed, unemployed, retired, student]
    nullable: true
  employerName:
    type: string
    classification: pii
    nullable: true
  monthsAtCurrentEmployer:
    type: integer
    nullable: true
  linkedBankAccountCount:
    type: integer
    required: true
    default: 0
  avgMonthlyInflowCents:
    type: integer
    classification: sensitive
    nullable: true
    description: Average monthly bank inflow over the last 3 months.
  avgMonthlyOutflowCents:
    type: integer
    classification: sensitive
    nullable: true
  estimatedMonthlyDebtObligationCents:
    type: integer
    classification: sensitive
    nullable: true
  openCreditLineCount:
    type: integer
    nullable: true
  totalCreditLimitCents:
    type: integer
    classification: sensitive
    nullable: true
  totalUtilisedCreditCents:
    type: integer
    classification: sensitive
    nullable: true
  updatedAt:
    type: timestamp
    required: true

---
domain: lending
model: LoanApplication
kind: event
version: 1
status: published
description: |
  Submitted loan application event. Captures the full application context at
  submission time including the requested product and the automated decision.

identity:
  key: applicationId

fields:
  applicationId:
    type: uuid
    required: true
  customerId:
    type: uuid
    required: true
    references:
      domain: customer
      model: CustomerFinancials
      field: customerId
  productCode:
    type: string
    required: true
    description: Loan product identifier (e.g. personal_3yr, auto_5yr).
  requestedAmountCents:
    type: integer
    required: true
  requestedTermMonths:
    type: integer
    required: true
  requestedPurpose:
    type: enum
    values: [debt_consolidation, home_improvement, auto, medical, education, other]
    nullable: true
  automatedDecision:
    type: enum
    values: [approved, declined, referred_manual, withdrawn]
    required: true
  offeredInterestRateBps:
    type: integer
    nullable: true
    description: Approved APR in basis points.
  offeredAmountCents:
    type: integer
    nullable: true
  declineReasonCodes:
    type: array
    items:
      type: string
    description: Machine-readable decline reason codes for regulatory reporting.
  modelScoreAtDecision:
    type: decimal
    classification: confidential
    nullable: true
    description: The credit model score used for the automated decision.
  submittedAt:
    type: timestamp
    required: true
  decidedAt:
    type: timestamp
    nullable: true

---
domain: lending
model: LoanPaymentHistory
kind: event
version: 2
status: published
description: |
  Individual loan repayment event. Tracks whether each scheduled payment
  was made on time, late, or missed — the core signal for repayment behaviour features.

identity:
  key: paymentEventId

fields:
  paymentEventId:
    type: uuid
    required: true
  loanId:
    type: uuid
    required: true
  customerId:
    type: uuid
    required: true
  scheduledDate:
    type: date
    required: true
  scheduledAmountCents:
    type: integer
    required: true
  paidAmountCents:
    type: integer
    nullable: true
  paidDate:
    type: date
    nullable: true
  daysLate:
    type: integer
    nullable: true
    description: 0 = on time, positive = days late, null = not yet paid.
  status:
    type: enum
    values: [on_time, late_1_30, late_31_60, late_61_90, defaulted, waived]
    required: true
  recordedAt:
    type: timestamp
    required: true

---
domain: credit-bureau
model: BureauReport
kind: entity
version: 1
status: published
description: |
  Point-in-time credit bureau snapshot for a customer. Ingested from bureau
  file feeds. Each ingestion creates a new record; the previous version is
  retained for PIT training queries.

identity:
  key: reportId

fields:
  reportId:
    type: uuid
    required: true
  customerId:
    type: uuid
    required: true
  bureauName:
    type: enum
    values: [experian, equifax, transunion, creditsafe]
    required: true
  creditScore:
    type: integer
    classification: sensitive
    required: true
    description: Bureau credit score (e.g. 300–850 FICO range).
  creditScoreModel:
    type: string
    required: true
    description: Score model identifier (e.g. FICO8, VantageScore3).
  numberOfOpenAccounts:
    type: integer
    nullable: true
  numberOfDerogAccounts:
    type: integer
    nullable: true
    description: Accounts with derogatory marks (charge-offs, collections).
  totalDebtCents:
    type: integer
    classification: sensitive
    nullable: true
  totalCreditLimitCents:
    type: integer
    classification: sensitive
    nullable: true
  utilizationRate:
    type: decimal
    nullable: true
    description: Total utilization 0.0–1.0.
  missedPaymentsLast12m:
    type: integer
    nullable: true
  publicRecordCount:
    type: integer
    nullable: true
    description: Bankruptcies, judgements, liens.
  hardInquiriesLast6m:
    type: integer
    nullable: true
  oldestAccountAgeDays:
    type: integer
    nullable: true
  reportDate:
    type: date
    required: true
    description: The date the bureau produced this report.
  ingestedAt:
    type: timestamp
    required: true

---
domain: ml-credit-risk
model: RiskScoreLabel
kind: event
version: 1
status: published
description: |
  Ground-truth label event linking a loan application to its eventual outcome.
  Used as the training target. Published by the lending team after sufficient
  repayment observation period (typically 12 months post-origination).

identity:
  key: labelId

fields:
  labelId:
    type: uuid
    required: true
  applicationId:
    type: uuid
    required: true
    references:
      domain: lending
      model: LoanApplication
      field: applicationId
  customerId:
    type: uuid
    required: true
  observationWindowMonths:
    type: integer
    required: true
    description: How many months of repayment data are included in this label.
  defaultedWithin12m:
    type: boolean
    required: true
  defaultedWithin24m:
    type: boolean
    nullable: true
  maxDaysLateObserved:
    type: integer
    required: true
  labelledAt:
    type: timestamp
    required: true
  featureCutoffAt:
    type: timestamp
    required: true
    description: Features must be snapshotted at or before this timestamp to avoid leakage.

---
domain: ml-credit-risk
projection: CreditFeaturesOffline
version: 3
status: published
description: |
  PIT-correct offline training snapshot. All features are extracted at or before
  featureCutoffAt from each label record to prevent leakage. Bureau and financial
  signals carry their classification forward; the snapshot is stored in encrypted
  Parquet on S3 with column-level access controls enforced by the storage binding.

sources:
  - domain: ml-credit-risk
    model: RiskScoreLabel
    version: 1
    alias: lbl
  - domain: lending
    model: LoanApplication
    version: 1
    alias: app
    joinOn:
      left: lbl.applicationId
      right: app.applicationId
    pitCutoff: lbl.featureCutoffAt
  - domain: customer
    model: CustomerFinancials
    version: 2
    alias: fin
    joinOn:
      left: lbl.customerId
      right: fin.customerId
    pitCutoff: lbl.featureCutoffAt
  - domain: credit-bureau
    model: BureauReport
    version: 1
    alias: bur
    joinOn:
      left: lbl.customerId
      right: bur.customerId
    pitCutoff: lbl.featureCutoffAt
    latestBefore: lbl.featureCutoffAt

fields:
  applicationId:
    from: lbl.applicationId
  customerId:
    from: lbl.customerId
  featureCutoffAt:
    from: lbl.featureCutoffAt
  label_defaulted_12m:
    from: lbl.defaultedWithin12m
  label_defaulted_24m:
    from: lbl.defaultedWithin24m
  requested_amount_cents:
    from: app.requestedAmountCents
  requested_term_months:
    from: app.requestedTermMonths
  loan_purpose:
    from: app.requestedPurpose
  declared_income_cents:
    from: fin.declaredAnnualIncomeCents
    classification: sensitive
  employment_status:
    from: fin.employmentStatus
  months_at_employer:
    from: fin.monthsAtCurrentEmployer
  bank_avg_inflow_cents:
    from: fin.avgMonthlyInflowCents
    classification: sensitive
  bank_avg_outflow_cents:
    from: fin.avgMonthlyOutflowCents
    classification: sensitive
  open_credit_lines:
    from: fin.openCreditLineCount
  credit_utilisation:
    from: fin.totalUtilisedCreditCents
    classification: sensitive
  bureau_credit_score:
    from: bur.creditScore
    classification: sensitive
  bureau_utilization_rate:
    from: bur.utilizationRate
  bureau_derog_accounts:
    from: bur.numberOfDerogAccounts
  bureau_missed_payments_12m:
    from: bur.missedPaymentsLast12m
  bureau_hard_inquiries_6m:
    from: bur.hardInquiriesLast6m
  bureau_public_records:
    from: bur.publicRecordCount
  bureau_oldest_account_days:
    from: bur.oldestAccountAgeDays
  debt_to_income_ratio:
    expression: "fin.estimatedMonthlyDebtObligationCents != null && fin.avgMonthlyInflowCents > 0 ? decimal(fin.estimatedMonthlyDebtObligationCents) / decimal(fin.avgMonthlyInflowCents) : null"
    type: decimal
    nullable: true

materialisation:
  strategy: snapshot
  snapshotAt: "{{ training_cutoff_timestamp }}"
  format: parquet
  binding: s3-training-snapshots
  destination: "s3://ml-credit-risk-features/offline/v3/"
  partitionBy: featureCutoffAt
  granularity: month
  encryption: aes256_at_rest

---
domain: ml-credit-risk
projection: CreditFeaturesOnline
version: 3
status: published
description: |
  Real-time serving features for inference. Mirrors the offline feature set but
  materialised as a Redis hash per customer. Must reference the same projection
  version as the offline snapshot to prevent training/serving skew.

sources:
  - domain: customer
    model: CustomerFinancials
    version: 2
    alias: fin
  - domain: credit-bureau
    model: BureauReport
    version: 1
    alias: bur
    joinOn:
      left: fin.customerId
      right: bur.customerId
    latestOnly: true

identity:
  key: customerId

fields:
  customerId:
    from: fin.customerId
  declared_income_cents:
    from: fin.declaredAnnualIncomeCents
    classification: sensitive
  employment_status:
    from: fin.employmentStatus
  months_at_employer:
    from: fin.monthsAtCurrentEmployer
  bank_avg_inflow_cents:
    from: fin.avgMonthlyInflowCents
    classification: sensitive
  bank_avg_outflow_cents:
    from: fin.avgMonthlyOutflowCents
    classification: sensitive
  open_credit_lines:
    from: fin.openCreditLineCount
  credit_utilisation_cents:
    from: fin.totalUtilisedCreditCents
    classification: sensitive
  bureau_credit_score:
    from: bur.creditScore
    classification: sensitive
  bureau_utilization_rate:
    from: bur.utilizationRate
  bureau_derog_accounts:
    from: bur.numberOfDerogAccounts
  bureau_missed_payments_12m:
    from: bur.missedPaymentsLast12m
  bureau_hard_inquiries_6m:
    from: bur.hardInquiriesLast6m
  bureau_public_records:
    from: bur.publicRecordCount
  bureau_oldest_account_days:
    from: bur.oldestAccountAgeDays
  bureau_report_age_days:
    expression: "date_diff('day', bur.reportDate, today())"
    type: integer
    description: Staleness indicator; inference should flag reports older than 90 days.
  debt_to_income_ratio:
    expression: "fin.estimatedMonthlyDebtObligationCents != null && fin.avgMonthlyInflowCents > 0 ? decimal(fin.estimatedMonthlyDebtObligationCents) / decimal(fin.avgMonthlyInflowCents) : null"
    type: decimal
    nullable: true
  featuresUpdatedAt:
    expression: "max(fin.updatedAt, bur.ingestedAt)"
    type: timestamp

materialisation:
  strategy: upsert
  key: customerId
  binding: redis-online-features
  ttlSeconds: 86400

subscription:
  sources:
    - customer.customer_financials.v2
    - credit_bureau.bureau_report.v1
  adapter: kafka-ml-features-source
  consumerGroup: credit-risk-online-feature-materialiser
  maxLagMs: 10000

---
domain: ml-credit-risk
projection: BureauFeaturesAnonymised
version: 2
status: published
description: |
  Anonymised bureau feature projection for use in model artefacts that are exported
  outside the ML platform (e.g. shared with regulators or external model validators).
  Direct identifiers are removed; continuous signals are bucketed to prevent
  re-identification from extreme values.

sources:
  - domain: credit-bureau
    model: BureauReport
    version: 1
    alias: bur

fields:
  bureauName:
    from: bur.bureauName
  reportDate:
    from: bur.reportDate
  credit_score_band:
    expression: "bur.creditScore < 580 ? 'poor' : bur.creditScore < 670 ? 'fair' : bur.creditScore < 740 ? 'good' : bur.creditScore < 800 ? 'very_good' : 'exceptional'"
    type: string
    description: Bucketed score band to prevent re-identification from exact score values.
  utilization_band:
    expression: "bur.utilizationRate < 0.1 ? 'very_low' : bur.utilizationRate < 0.3 ? 'low' : bur.utilizationRate < 0.5 ? 'medium' : bur.utilizationRate < 0.75 ? 'high' : 'very_high'"
    type: string
    nullable: true
  derog_count_band:
    expression: "bur.numberOfDerogAccounts == 0 ? 'none' : bur.numberOfDerogAccounts <= 2 ? 'few' : 'many'"
    type: string
    nullable: true
  has_public_records:
    expression: "bur.publicRecordCount != null && bur.publicRecordCount > 0"
    type: boolean
  inquiry_band:
    expression: "bur.hardInquiriesLast6m == 0 ? 'none' : bur.hardInquiriesLast6m <= 2 ? 'low' : bur.hardInquiriesLast6m <= 5 ? 'medium' : 'high'"
    type: string
    nullable: true

materialisation:
  strategy: snapshot
  format: parquet
  binding: s3-training-snapshots
  destination: "s3://ml-credit-risk-features/anonymised/bureau/v2/"
  encryption: aes256_at_rest

---
binding: s3-training-snapshots
adapter: object_storage
role: sink
config:
  provider: aws_s3
  region: eu-west-1
  credentialSecret: s3-ml-features-write-role
  format: parquet
  compression: snappy
  encryption: SSE-KMS
  kmsKeyArn: "arn:aws:kms:eu-west-1:123456789:key/ml-features-key"
  partitionOverwriteMode: dynamic

---
binding: redis-online-features
adapter: redis
role: sink
config:
  host: redis.ml.internal
  port: 6380
  tls: true
  keyPrefix: "credit:features:online:"
  serialisation: msgpack
  defaultTtlSeconds: 86400
  maxConnections: 30
  connectTimeoutMs: 100

---
binding: kafka-ml-features-source
adapter: kafka
role: stream
config:
  brokers:
    - kafka-1.internal:9092
    - kafka-2.internal:9092
  tls: true
  saslMechanism: SCRAM-SHA-512
  credentialSecret: kafka-ml-consumer-creds
  consumerGroup: credit-risk-feature-materialiser
  maxPollRecords: 200
  sessionTimeoutMs: 45000
