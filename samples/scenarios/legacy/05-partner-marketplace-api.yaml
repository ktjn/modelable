scenario: partner-marketplace-api
title: "Partner Marketplace API — Versioned External Contracts"
platform: api-consumer
description: |
  An e-commerce marketplace exposes product catalog, inventory levels, and order
  status data to 500+ seller partners via a versioned REST API. Each projection
  becomes a versioned API contract; Modellable generates OpenAPI 3.1 documents,
  TypeScript SDK types, and Protobuf schemas directly from the projection definitions.

  Strict per-partner access scoping is enforced at the projection level: a seller
  can only read inventory and orders belonging to their own seller account. Field-level
  visibility rules ensure that internal cost prices, supplier margins, and cross-seller
  competitive intelligence never reach the API surface.

  Deprecation is managed through the projection lifecycle: when v1 of a contract
  is superseded by v2, the runtime continues serving both versions during the
  migration window, injecting a `Deprecation` response header on v1 calls and
  generating a diff-based migration guide for partners.

  Webhook delivery allows partners to subscribe to inventory change events rather
  than polling; payloads are signed with per-partner HMAC-SHA256 secrets.
complexity: high
tags: [api, openapi, versioning, partner-access, webhooks, typescript, protobuf, deprecation]

---
domain: catalogue
owner: catalogue-team
contact: catalogue@example.com
description: Product listings, categories, attributes, and pricing data.
policies:
  defaultClassification: internal
  piiHandling: not_applicable

---
domain: inventory
owner: inventory-team
contact: inventory@example.com
description: Seller-level inventory quantities, reservations, and fulfilment flags.
policies:
  defaultClassification: internal

---
domain: commerce
owner: commerce-team
contact: commerce@example.com
description: Orders, line items, and order status lifecycle.
policies:
  defaultClassification: confidential

---
domain: marketplace-api
owner: platform-team
contact: platform@example.com
description: Externally published API projections for partner and seller integrations.
policies:
  defaultClassification: public

---
domain: catalogue
model: ProductListing
kind: entity
version: 3
status: published
description: |
  Canonical product listing in the marketplace catalogue. Contains internal fields
  (supplier cost, internal margin codes) that must never reach the external API surface.

identity:
  key: productId

fields:
  productId:
    type: string
    required: true
  sellerId:
    type: string
    required: true
    description: The seller account that owns this listing.
  name:
    type: string
    required: true
  descriptionShort:
    type: string
    nullable: true
  descriptionLong:
    type: string
    nullable: true
  categoryId:
    type: string
    required: true
  brandName:
    type: string
    nullable: true
  gtin:
    type: string
    nullable: true
    description: Global Trade Item Number (barcode).
  sku:
    type: string
    required: true
  retailPriceCents:
    type: integer
    required: true
  salePriceCents:
    type: integer
    nullable: true
  currencyCode:
    type: string
    format: iso4217
    required: true
  supplierCostCents:
    type: integer
    classification: confidential
    description: Internal cost — must never appear in any external API projection.
  marginCode:
    type: string
    classification: confidential
    description: Internal margin tier code. Excluded from all external projections.
  primaryImageUrl:
    type: string
    format: uri
    nullable: true
  additionalImageUrls:
    type: array
    items:
      type: string
      format: uri
  tags:
    type: array
    items:
      type: string
  availabilityStatus:
    type: enum
    values: [active, paused, out_of_stock, delisted]
    required: true
  createdAt:
    type: timestamp
    required: true
  updatedAt:
    type: timestamp
    required: true

---
domain: catalogue
model: ProductCategory
kind: entity
version: 1
status: published
description: Hierarchical product category tree used to classify listings.

identity:
  key: categoryId

fields:
  categoryId:
    type: string
    required: true
  parentCategoryId:
    type: string
    nullable: true
    references:
      domain: catalogue
      model: ProductCategory
      field: categoryId
  name:
    type: string
    required: true
  slug:
    type: string
    required: true
  level:
    type: integer
    required: true
    description: 0 = root, 1 = top-level, 2 = sub-category, etc.
  isLeaf:
    type: boolean
    required: true
  breadcrumbPath:
    type: string
    nullable: true
    description: Slash-separated path of category names from root to this node.

---
domain: inventory
model: SellerInventoryLevel
kind: aggregate
version: 2
status: published
description: |
  Per-seller inventory quantity aggregate. Tracks available, reserved, and
  incoming quantities per SKU per warehouse. Cross-seller inventory data must
  never be visible to another seller.

identity:
  key: [sellerId, sku, warehouseId]

fields:
  sellerId:
    type: string
    required: true
  sku:
    type: string
    required: true
  productId:
    type: string
    required: true
    references:
      domain: catalogue
      model: ProductListing
      field: productId
  warehouseId:
    type: string
    required: true
  warehouseName:
    type: string
    required: true
  quantityOnHand:
    type: integer
    required: true
    default: 0
  quantityReserved:
    type: integer
    required: true
    default: 0
  quantityAvailable:
    type: integer
    required: true
    description: Computed as onHand minus reserved.
  quantityInbound:
    type: integer
    required: true
    default: 0
    description: Expected incoming stock from purchase orders.
  reorderPoint:
    type: integer
    nullable: true
  targetStockLevel:
    type: integer
    nullable: true
  isFulfilledByMarketplace:
    type: boolean
    required: true
    default: false
    description: True if marketplace warehousing is managing fulfilment.
  lastStocktakeAt:
    type: timestamp
    nullable: true
  updatedAt:
    type: timestamp
    required: true

---
domain: commerce
model: SellerOrder
kind: entity
version: 2
status: published
description: |
  An order record scoped to one seller's line items within a multi-seller basket.
  Customer PII fields are included because the seller needs them for fulfilment
  but they must be access-controlled at the projection layer.

identity:
  key: sellerOrderId

fields:
  sellerOrderId:
    type: uuid
    required: true
  orderId:
    type: uuid
    required: true
    description: Parent marketplace order containing potentially multiple sellers.
  sellerId:
    type: string
    required: true
  customerId:
    type: uuid
    required: true
  customerName:
    type: string
    classification: pii
    required: true
  customerEmail:
    type: string
    format: email
    classification: pii
    required: true
  shippingAddressLine1:
    type: string
    classification: pii
    required: true
  shippingAddressLine2:
    type: string
    classification: pii
    nullable: true
  shippingCity:
    type: string
    required: true
  shippingPostalCode:
    type: string
    required: true
  shippingCountryCode:
    type: string
    format: iso3166_alpha2
    required: true
  items:
    type: array
    items:
      type: object
      fields:
        sku:
          type: string
          required: true
        productId:
          type: string
          required: true
        quantity:
          type: integer
          required: true
        unitPriceCents:
          type: integer
          required: true
  status:
    type: enum
    values: [received, acknowledged, shipped, delivered, cancelled, return_requested, returned]
    required: true
  totalAmountCents:
    type: integer
    required: true
  currencyCode:
    type: string
    format: iso4217
    required: true
  placedAt:
    type: timestamp
    required: true
  acknowledgedAt:
    type: timestamp
    nullable: true
  shippedAt:
    type: timestamp
    nullable: true
  deliveredAt:
    type: timestamp
    nullable: true

---
domain: marketplace-api
projection: PartnerProductCatalogV2
version: 2
status: published
description: |
  Public-facing product catalog contract for partner integrations. Exposes product
  metadata, pricing, and availability. Internal cost and margin fields are explicitly
  excluded; any attempt to add them triggers a compiler error.

  Generated artifacts: OpenAPI 3.1, TypeScript (ESM), Protobuf proto3.

sources:
  - domain: catalogue
    model: ProductListing
    version: 3
    alias: pl
  - domain: catalogue
    model: ProductCategory
    version: 1
    alias: cat
    joinOn:
      left: pl.categoryId
      right: cat.categoryId

filter:
  expression: "pl.availabilityStatus != 'delisted'"

fields:
  product_id:
    from: pl.productId
  seller_id:
    from: pl.sellerId
  name:
    from: pl.name
  description_short:
    from: pl.descriptionShort
  description_long:
    from: pl.descriptionLong
  sku:
    from: pl.sku
  gtin:
    from: pl.gtin
  brand_name:
    from: pl.brandName
  category_id:
    from: pl.categoryId
  category_name:
    from: cat.name
  category_path:
    from: cat.breadcrumbPath
  retail_price_cents:
    from: pl.retailPriceCents
  sale_price_cents:
    from: pl.salePriceCents
  currency_code:
    from: pl.currencyCode
  primary_image_url:
    from: pl.primaryImageUrl
  additional_image_urls:
    from: pl.additionalImageUrls
  tags:
    from: pl.tags
  availability:
    from: pl.availabilityStatus
  updated_at:
    from: pl.updatedAt

access:
  visibility: partner
  authentication: api_key
  rateLimit: 500rpm
  scopeRequired: catalogue.read

artifacts:
  - format: openapi_3_1
    outputPath: artifacts/openapi/partner-product-catalog-v2.yaml
  - format: typescript
    outputPath: artifacts/typescript/partner-product-catalog-v2.d.ts
  - format: protobuf
    outputPath: artifacts/proto/partner_product_catalog_v2.proto
    packageName: marketplace.api.v2

---
domain: marketplace-api
projection: SellerInventoryView
version: 1
status: published
description: |
  Seller-scoped inventory projection. Access control is enforced at the binding
  level: the api-gateway injects the authenticated sellerId as a runtime filter
  parameter, ensuring sellers cannot read each other's stock levels.

sources:
  - domain: inventory
    model: SellerInventoryLevel
    version: 2
    alias: inv

filter:
  expression: "inv.sellerId == request.sellerId"
  runtimeParams:
    request.sellerId:
      type: string
      source: auth_context

fields:
  sku:
    from: inv.sku
  product_id:
    from: inv.productId
  warehouse_id:
    from: inv.warehouseId
  warehouse_name:
    from: inv.warehouseName
  quantity_available:
    from: inv.quantityAvailable
  quantity_inbound:
    from: inv.quantityInbound
  is_fulfilled_by_marketplace:
    from: inv.isFulfilledByMarketplace
  last_updated_at:
    from: inv.updatedAt

access:
  visibility: seller
  authentication: api_key
  rateLimit: 200rpm
  scopeRequired: inventory.read
  accessControlField: sellerId

artifacts:
  - format: openapi_3_1
    outputPath: artifacts/openapi/seller-inventory-view-v1.yaml
  - format: typescript
    outputPath: artifacts/typescript/seller-inventory-view-v1.d.ts

---
domain: marketplace-api
projection: SellerOrderStatusV1
version: 1
status: published
description: |
  Order status view for sellers. Includes shipping address PII because sellers
  need it for fulfilment. Access is scoped per seller via runtime filter; sellers
  cannot view orders belonging to other sellers. Customer email is included for
  seller-to-buyer dispute resolution but must not be stored by the seller beyond
  the fulfilment window.

sources:
  - domain: commerce
    model: SellerOrder
    version: 2
    alias: so

filter:
  expression: "so.sellerId == request.sellerId"
  runtimeParams:
    request.sellerId:
      type: string
      source: auth_context

fields:
  seller_order_id:
    from: so.sellerOrderId
  order_id:
    from: so.orderId
  customer_name:
    from: so.customerName
    classification: pii
  customer_email:
    from: so.customerEmail
    classification: pii
  shipping_address_line1:
    from: so.shippingAddressLine1
    classification: pii
  shipping_address_line2:
    from: so.shippingAddressLine2
    classification: pii
  shipping_city:
    from: so.shippingCity
  shipping_postal_code:
    from: so.shippingPostalCode
  shipping_country_code:
    from: so.shippingCountryCode
  items:
    from: so.items
  status:
    from: so.status
  total_amount_cents:
    from: so.totalAmountCents
  currency_code:
    from: so.currencyCode
  placed_at:
    from: so.placedAt
  shipped_at:
    from: so.shippedAt
  delivered_at:
    from: so.deliveredAt

access:
  visibility: seller
  authentication: api_key
  rateLimit: 300rpm
  scopeRequired: orders.read
  accessControlField: sellerId

artifacts:
  - format: openapi_3_1
    outputPath: artifacts/openapi/seller-order-status-v1.yaml

---
domain: marketplace-api
projection: InventoryChangeWebhook
version: 1
status: published
description: |
  Webhook payload schema for inventory change events. Partners subscribe to
  receive push notifications when stock levels cross configured thresholds.
  Each delivery is signed with the partner's registered HMAC-SHA256 secret.
  Internal cost data and cross-seller inventory are excluded.

sources:
  - domain: inventory
    model: SellerInventoryLevel
    version: 2
    alias: inv

filter:
  expression: "inv.quantityAvailable != inv.quantityAvailable_prev"

fields:
  event_type:
    expression: "'inventory.level_changed'"
    type: string
  seller_id:
    from: inv.sellerId
  sku:
    from: inv.sku
  product_id:
    from: inv.productId
  warehouse_id:
    from: inv.warehouseId
  quantity_available:
    from: inv.quantityAvailable
  quantity_inbound:
    from: inv.quantityInbound
  changed_at:
    from: inv.updatedAt

access:
  visibility: partner
  deliveryMode: webhook
  signatureScheme: hmac_sha256
  signatureHeaderName: X-Marketplace-Signature
  retryPolicy:
    maxAttempts: 5
    backoffSeconds: [10, 30, 60, 300, 600]
  timeoutMs: 5000

artifacts:
  - format: openapi_3_1
    outputPath: artifacts/openapi/inventory-change-webhook-v1.yaml
  - format: json_schema
    outputPath: artifacts/json-schema/inventory-change-webhook-v1.json
