scenario: order-saga-microservices
title: "Order Fulfillment Saga via Event-Driven Microservices"
platform: event-driven-microservices
description: |
  A multi-service order fulfillment system coordinates five independent services
  (commerce, inventory, payments, shipping, notifications) through a choreography
  saga on Kafka. Each service subscribes to events produced by the previous step
  and advances the saga by publishing its own outcome event.

  No service directly calls another. The saga is driven entirely by domain events
  flowing through Modellable-governed projections. Each projection is field-scoped
  to what the subscribing service actually needs — the inventory service never
  sees payment card data; the notifications service never sees raw inventory levels.

  CEL filter expressions on each projection ensure services only receive events
  relevant to their operational state (e.g., the payment service only processes
  orders with confirmed inventory reservations), reducing Kafka consumer lag and
  eliminating defensive conditional logic inside services.
complexity: high
tags: [saga, choreography, kafka, microservices, order-fulfillment, dlq, cel-filter]

---
domain: commerce
owner: commerce-team
contact: commerce@example.com
description: Order creation, lifecycle events, and fulfillment state tracking.

---
domain: inventory
owner: inventory-team
contact: inventory@example.com
description: Stock reservation, release, and inventory level management.

---
domain: payments
owner: payments-team
contact: payments@example.com
description: Payment authorisation, capture, and refund processing.

---
domain: shipping
owner: logistics-team
contact: logistics@example.com
description: Shipment label creation, carrier assignments, and delivery tracking.

---
domain: notifications
owner: platform-team
contact: platform@example.com
description: Customer-facing notification triggers derived from fulfillment events.

---
domain: commerce
model: OrderCreated
kind: event
version: 2
status: published
description: |
  Emitted when a customer completes checkout. Contains everything downstream
  services need to begin their part of the saga. All subsequent saga events
  carry orderId as the correlation key.

identity:
  key: orderId

fields:
  orderId:
    type: uuid
    required: true
  customerId:
    type: uuid
    required: true
  customerEmail:
    type: string
    format: email
    classification: pii
    required: true
  shippingName:
    type: string
    classification: pii
    required: true
  shippingAddressLine1:
    type: string
    classification: pii
    required: true
  shippingAddressLine2:
    type: string
    classification: pii
    nullable: true
  shippingCity:
    type: string
    required: true
  shippingCountryCode:
    type: string
    format: iso3166_alpha2
    required: true
  shippingPostalCode:
    type: string
    required: true
  items:
    type: array
    items:
      type: object
      fields:
        productId:
          type: string
          required: true
        sku:
          type: string
          required: true
        warehouseId:
          type: string
          required: true
        quantity:
          type: integer
          required: true
        unitPriceCents:
          type: integer
          required: true
    required: true
  totalAmountCents:
    type: integer
    required: true
  currencyCode:
    type: string
    format: iso4217
    required: true
  paymentMethodToken:
    type: string
    classification: confidential
    required: true
    description: Tokenised payment method reference; never the raw card number.
  createdAt:
    type: timestamp
    required: true

---
domain: inventory
model: InventoryReservation
kind: event
version: 1
status: published
description: |
  Emitted by the inventory service after attempting to reserve stock for an order.
  The outcome field indicates whether all items were reserved or if a partial/full
  failure occurred, so the commerce service can cancel or partially fulfil.

identity:
  key: reservationId

fields:
  reservationId:
    type: uuid
    required: true
  orderId:
    type: uuid
    required: true
    references:
      domain: commerce
      model: OrderCreated
      field: orderId
  outcome:
    type: enum
    values: [reserved, partial, failed]
    required: true
  reservedItems:
    type: array
    items:
      type: object
      fields:
        productId:
          type: string
          required: true
        sku:
          type: string
          required: true
        warehouseId:
          type: string
          required: true
        quantityReserved:
          type: integer
          required: true
    required: true
  failedItems:
    type: array
    items:
      type: object
      fields:
        productId:
          type: string
          required: true
        sku:
          type: string
          required: true
        quantityRequested:
          type: integer
          required: true
        quantityAvailable:
          type: integer
          required: true
    description: Items that could not be fully reserved.
  reservedAt:
    type: timestamp
    required: true
  expiresAt:
    type: timestamp
    required: true
    description: Reservation is released if payment is not captured by this time.

---
domain: payments
model: PaymentAuthorisation
kind: event
version: 2
status: published
description: |
  Emitted after a payment authorisation attempt. Distinguishes between
  authorised (funds held), captured (funds transferred), declined, and
  refunded states to support the full payment saga lifecycle.

identity:
  key: paymentId

fields:
  paymentId:
    type: uuid
    required: true
  orderId:
    type: uuid
    required: true
    references:
      domain: commerce
      model: OrderCreated
      field: orderId
  reservationId:
    type: uuid
    required: true
    references:
      domain: inventory
      model: InventoryReservation
      field: reservationId
  outcome:
    type: enum
    values: [authorised, captured, declined, refunded, voided]
    required: true
  amountCents:
    type: integer
    required: true
  currencyCode:
    type: string
    format: iso4217
    required: true
  processorTransactionId:
    type: string
    nullable: true
  declineReason:
    type: string
    nullable: true
  processorFeesCents:
    type: integer
    nullable: true
  processedAt:
    type: timestamp
    required: true

---
domain: shipping
model: ShipmentLabel
kind: event
version: 1
status: published
description: |
  Emitted when the logistics service generates a carrier shipment label.
  Contains the tracking reference and estimated delivery window.

identity:
  key: shipmentId

fields:
  shipmentId:
    type: uuid
    required: true
  orderId:
    type: uuid
    required: true
    references:
      domain: commerce
      model: OrderCreated
      field: orderId
  paymentId:
    type: uuid
    required: true
    references:
      domain: payments
      model: PaymentAuthorisation
      field: paymentId
  carrierCode:
    type: string
    required: true
    description: E.g. ups, fedex, dhl, royal_mail.
  trackingNumber:
    type: string
    required: true
  labelUrl:
    type: string
    format: uri
    required: true
  warehouseId:
    type: string
    required: true
  estimatedDeliveryDate:
    type: date
    nullable: true
  shippedAt:
    type: timestamp
    required: true

---
domain: commerce
model: OrderFulfillmentState
kind: aggregate
version: 1
status: published
description: |
  Saga state machine maintained by the commerce service. Aggregates events from
  all participating services to track the current fulfillment stage and expose
  a unified order status to customer-facing surfaces.

identity:
  key: orderId

fields:
  orderId:
    type: uuid
    required: true
  sagaStage:
    type: enum
    values:
      - awaiting_inventory
      - inventory_reserved
      - inventory_failed
      - payment_pending
      - payment_captured
      - payment_declined
      - label_created
      - shipped
      - delivered
      - cancelled
      - refunded
    required: true
  reservationId:
    type: uuid
    nullable: true
  paymentId:
    type: uuid
    nullable: true
  shipmentId:
    type: uuid
    nullable: true
  trackingNumber:
    type: string
    nullable: true
  carrierCode:
    type: string
    nullable: true
  estimatedDeliveryDate:
    type: date
    nullable: true
  failureReason:
    type: string
    nullable: true
  lastTransitionAt:
    type: timestamp
    required: true
  updatedAt:
    type: timestamp
    required: true

---
domain: inventory
projection: OrderReservationTriggers
version: 1
status: published
description: |
  Events the inventory service subscribes to in order to trigger stock reservation.
  Filtered to orders that are not already being processed to avoid double-reservation
  on consumer restart replays.

sources:
  - domain: commerce
    model: OrderCreated
    version: 2
    alias: oc

filter:
  expression: "oc.items.size() > 0"

fields:
  orderId:
    from: oc.orderId
  items:
    from: oc.items
  shippingCountryCode:
    from: oc.shippingCountryCode
  totalAmountCents:
    from: oc.totalAmountCents
  createdAt:
    from: oc.createdAt

subscription:
  source: commerce.order_created.v2
  adapter: kafka-fulfillment-saga
  consumerGroup: inventory-service-reservation-sub
  fromOffset: earliest
  deadLetterTopic: inventory-service-reservation-sub.dlq
  maxRetries: 3
  retryBackoffMs: 1000

---
domain: payments
projection: ConfirmedInventoryEvents
version: 1
status: published
description: |
  Events the payments service subscribes to in order to initiate payment capture.
  Filtered to fully-reserved outcomes only — partial or failed reservations are
  handled by the commerce service, not the payments service.

sources:
  - domain: inventory
    model: InventoryReservation
    version: 1
    alias: ir

filter:
  expression: "ir.outcome == 'reserved'"

fields:
  orderId:
    from: ir.orderId
  reservationId:
    from: ir.reservationId
  reservedAt:
    from: ir.reservedAt
  expiresAt:
    from: ir.expiresAt

subscription:
  source: inventory.inventory_reservation.v1
  adapter: kafka-fulfillment-saga
  consumerGroup: payments-service-capture-sub
  fromOffset: earliest
  deadLetterTopic: payments-service-capture-sub.dlq
  maxRetries: 5
  retryBackoffMs: 2000

---
domain: shipping
projection: CapturedPaymentEvents
version: 1
status: published
description: |
  Events the shipping service subscribes to in order to generate a carrier label.
  Filtered to captured payments; authorised-but-not-captured events do not trigger
  label creation.

sources:
  - domain: payments
    model: PaymentAuthorisation
    version: 2
    alias: pa
  - domain: commerce
    model: OrderCreated
    version: 2
    alias: oc
    joinOn:
      left: pa.orderId
      right: oc.orderId

filter:
  expression: "pa.outcome == 'captured'"

fields:
  orderId:
    from: pa.orderId
  paymentId:
    from: pa.paymentId
  shippingName:
    from: oc.shippingName
    classification: pii
  shippingAddressLine1:
    from: oc.shippingAddressLine1
    classification: pii
  shippingAddressLine2:
    from: oc.shippingAddressLine2
    classification: pii
  shippingCity:
    from: oc.shippingCity
  shippingCountryCode:
    from: oc.shippingCountryCode
  shippingPostalCode:
    from: oc.shippingPostalCode
  items:
    from: oc.items
  processedAt:
    from: pa.processedAt

subscription:
  source: payments.payment_authorisation.v2
  adapter: kafka-fulfillment-saga
  consumerGroup: shipping-service-label-sub
  fromOffset: earliest
  deadLetterTopic: shipping-service-label-sub.dlq
  maxRetries: 3

---
domain: notifications
projection: FulfillmentNotificationTriggers
version: 1
status: published
description: |
  Events the notifications service uses to send customer-facing status updates.
  Subscribes to three event streams — shipment labels, payment outcomes, and
  reservation failures — so it can notify the customer at each key transition.
  PII fields are included only for the notification service; they are not
  forwarded to any analytics or audit sink from this projection.

sources:
  - domain: shipping
    model: ShipmentLabel
    version: 1
    alias: sl
  - domain: commerce
    model: OrderCreated
    version: 2
    alias: oc
    joinOn:
      left: sl.orderId
      right: oc.orderId

fields:
  orderId:
    from: sl.orderId
  customerEmail:
    from: oc.customerEmail
    classification: pii
  shippingName:
    from: oc.shippingName
    classification: pii
  notificationType:
    expression: "'order_shipped'"
    type: string
  trackingNumber:
    from: sl.trackingNumber
  carrierCode:
    from: sl.carrierCode
  estimatedDeliveryDate:
    from: sl.estimatedDeliveryDate
  shippedAt:
    from: sl.shippedAt

subscription:
  source: shipping.shipment_label.v1
  adapter: kafka-fulfillment-saga
  consumerGroup: notifications-service-fulfillment-sub
  fromOffset: earliest
  deadLetterTopic: notifications-service-fulfillment-sub.dlq
  maxRetries: 5

---
binding: kafka-fulfillment-saga
adapter: kafka
role: stream
config:
  brokers:
    - kafka-1.internal:9092
    - kafka-2.internal:9092
    - kafka-3.internal:9092
  tls: true
  saslMechanism: SCRAM-SHA-512
  credentialSecret: kafka-fulfillment-creds
  replicationFactor: 3
  retentionMs: 604800000
  compressionType: lz4
  partitionStrategy: key_hash
  partitionKey: orderId
  deadLetterRetentionMs: 1209600000
  enableIdempotentProducer: true
  acks: all
