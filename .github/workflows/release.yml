name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.versions.outputs.package-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock

      - name: Install Python
        working-directory: cli
        run: uv python install 3.14

      - name: Install CLI dependencies
        working-directory: cli
        run: uv sync --extra dev --frozen

      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: vscode
        run: npm ci

      - name: Run release gates
        run: |
          cd cli
          uv run pytest tests/ --tb=short
          uv run modelable validate ../samples/mvp --strict
          cd ../vscode
          npm run build
          xvfb-run -a npm test

      - name: Verify release versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(cd cli && uv run python -c 'import pathlib, tomllib; print(tomllib.load(pathlib.Path("pyproject.toml").open("rb"))["project"]["version"])')
          EXTENSION_VERSION=$(node -p "require('./vscode/package.json').version")
          if [ "$PACKAGE_VERSION" != "$EXTENSION_VERSION" ]; then
            echo "CLI version $PACKAGE_VERSION does not match extension version $EXTENSION_VERSION" >&2
            exit 1
          fi
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi
          grep -F "## [${PACKAGE_VERSION}]" CHANGELOG.md
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "EXTENSION_VERSION=${EXTENSION_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "package-version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Python distributions
        working-directory: cli
        run: uv run python -m build

      - name: Check Python distributions
        working-directory: cli
        run: uvx twine check dist/*

      - name: Build VS Code extension
        working-directory: vscode
        run: npm run package

      - name: Assemble and verify release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mv "vscode/modelable-vscode-${EXTENSION_VERSION}.vsix" cli/dist/
          uv venv cli/.release-venv --python 3.14
          uv pip install --python cli/.release-venv/bin/python cli/dist/*.whl
          cli/.release-venv/bin/modelable --version
          cli/.release-venv/bin/modelable validate samples/mvp --strict
          args=(
            --dist dist
            --commit-sha "${GITHUB_SHA}"
            --package-version "${PACKAGE_VERSION}"
            --python-version "3.14"
            --build-timestamp "${BUILD_TIMESTAMP}"
            --repository-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            --license-expression "Apache-2.0"
            --workflow-run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            --extension-version "${EXTENSION_VERSION}"
          )
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            args+=(--git-tag "${GITHUB_REF_NAME}")
          fi
          cd cli
          uv run python -m modelable.release "${args[@]}"

      - name: Upload release dry-run artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: modelable-${{ env.PACKAGE_VERSION }}
          path: |
            cli/dist/*.whl
            cli/dist/*.tar.gz
            cli/dist/*.vsix
            cli/dist/SHA256SUMS
            cli/dist/release-manifest.json
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: modelable-${{ needs.build.outputs.package-version }}
          path: dist

      - name: Keep only Python distributions
        run: find dist -type f ! -name '*.whl' ! -name '*.tar.gz' -delete

      - name: Publish Python distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-marketplace:
    name: Publish to VS Code Marketplace
    if: false
    needs: build
    runs-on: ubuntu-latest
    environment: marketplace

    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: modelable-${{ needs.build.outputs.package-version }}
          path: dist

      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26

      - name: Publish VS Code extension
        run: npx --yes @vscode/vsce@latest publish --packagePath dist/*.vsix --pat "${{ secrets.VSCE_PAT }}"

  github-release:
    name: Create GitHub release
    if: github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: modelable-${{ needs.build.outputs.package-version }}
          path: dist

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v3.0.1
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.vsix
            dist/SHA256SUMS
            dist/release-manifest.json
