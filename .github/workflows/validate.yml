name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest

    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      vscode: ${{ steps.filter.outputs.vscode }}
      odcs: ${{ steps.filter.outputs.odcs }}
      openmetadata: ${{ steps.filter.outputs.openmetadata }}
      openlineage: ${{ steps.filter.outputs.openlineage }}
      fhir: ${{ steps.filter.outputs.fhir }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Compute changed surfaces
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            range="FETCH_HEAD...HEAD"
          elif git rev-parse --verify "${{ github.event.before }}" >/dev/null 2>&1; then
            range="${{ github.event.before }}..HEAD"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            range="HEAD^..HEAD"
          else
            git ls-tree -r --name-only HEAD > changed-files.txt
            range=""
          fi

          if [[ -n "${range}" ]]; then
            git diff --name-only "${range}" > changed-files.txt
          fi

          python .github/scripts/detect_validate_surfaces.py \
            --event-name "${{ github.event_name }}" \
            --changed-files changed-files.txt

  cli:
    name: CLI core
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock
          cache-suffix: cli

      - name: Install Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format check with ruff
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest --tb=short --cov=modelable --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v6.1.0
        with:
          name: cli-coverage-xml
          path: cli/coverage.xml

      - name: Audit Python dependencies
        run: uv run --with pip-audit pip-audit --strict --progress-spinner off

  odcs:
    name: ODCS lint smoke
    needs: changes
    if: needs.changes.outputs.odcs == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock
          cache-suffix: odcs

      - name: Install Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Run ODCS Data Contract CLI lint smoke
        env:
          MODELABLE_DATACONTRACT_CLI: "1"
        run: uv run --with datacontract-cli pytest tests/test_emit_odcs.py --tb=short -q

  openmetadata:
    name: OpenMetadata live smoke
    needs: changes
    if: needs.changes.outputs.openmetadata == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock
          cache-suffix: openmetadata

      - name: Install Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Restore OpenMetadata Docker image cache
        id: openmetadata-image-cache
        uses: actions/cache@v6.1.0
        with:
          path: /tmp/modelable-openmetadata-images.tar
          key: openmetadata-images-1.12.11-elasticsearch-9.4.2-${{ runner.os }}-${{ runner.arch }}

      - name: Load cached OpenMetadata Docker images
        if: steps.openmetadata-image-cache.outputs.cache-hit == 'true'
        run: docker load --input /tmp/modelable-openmetadata-images.tar

      - name: Pull OpenMetadata Docker images
        if: steps.openmetadata-image-cache.outputs.cache-hit != 'true'
        run: |
          docker pull docker.getcollate.io/openmetadata/db:1.12.11
          docker pull docker.getcollate.io/openmetadata/server:1.12.11
          docker pull docker.elastic.co/elasticsearch/elasticsearch:9.4.2

      - name: Save OpenMetadata Docker image cache
        if: steps.openmetadata-image-cache.outputs.cache-hit != 'true'
        run: |
          docker save --output /tmp/modelable-openmetadata-images.tar \
            docker.getcollate.io/openmetadata/db:1.12.11 \
            docker.getcollate.io/openmetadata/server:1.12.11 \
            docker.elastic.co/elasticsearch/elasticsearch:9.4.2

      - name: Run OpenMetadata Testcontainers smoke
        env:
          MODELABLE_OPENMETADATA_TESTCONTAINERS: "1"
          MODELABLE_OPENMETADATA_PULL: "0"
        run: uv run pytest tests/test_openmetadata_testcontainers.py --tb=short -q

  fhir:
    name: FHIR Validator smoke
    needs: changes
    if: needs.changes.outputs.fhir == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock
          cache-suffix: fhir

      - name: Install Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Install Java for FHIR Validator
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Restore FHIR Validator cache
        id: fhir-validator-cache
        uses: actions/cache@v6.1.0
        with:
          path: /tmp/validator_cli.jar
          key: fhir-validator-cli-6.9.10

      - name: Download FHIR Validator
        if: steps.fhir-validator-cache.outputs.cache-hit != 'true'
        run: curl -L -o /tmp/validator_cli.jar https://github.com/hapifhir/org.hl7.fhir.core/releases/download/6.9.10/validator_cli.jar

      - name: Run FHIR Validator smoke
        env:
          MODELABLE_FHIR_VALIDATOR: "1"
          MODELABLE_FHIR_VALIDATOR_JAR: /tmp/validator_cli.jar
        run: uv run pytest tests/test_fhir_validator.py --tb=short -q

  openlineage:
    name: OpenLineage live smoke
    needs: changes
    if: needs.changes.outputs.openlineage == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock
          cache-suffix: openlineage

      - name: Install Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Restore Marquez Docker image cache
        id: marquez-image-cache
        uses: actions/cache@v6.1.0
        with:
          path: /tmp/modelable-marquez-images.tar
          key: marquez-images-0.51.1-postgres-14-${{ runner.os }}-${{ runner.arch }}

      - name: Load cached Marquez Docker images
        if: steps.marquez-image-cache.outputs.cache-hit == 'true'
        run: docker load --input /tmp/modelable-marquez-images.tar

      - name: Pull Marquez Docker images
        if: steps.marquez-image-cache.outputs.cache-hit != 'true'
        run: |
          docker pull marquezproject/marquez:0.51.1
          docker pull postgres:14

      - name: Save Marquez Docker image cache
        if: steps.marquez-image-cache.outputs.cache-hit != 'true'
        run: |
          docker save --output /tmp/modelable-marquez-images.tar \
            marquezproject/marquez:0.51.1 \
            postgres:14

      - name: Run Marquez OpenLineage Testcontainers smoke
        env:
          MODELABLE_OPENLINEAGE_TESTCONTAINERS: "1"
          MODELABLE_MARQUEZ_PULL: "0"
        run: uv run pytest tests/test_openlineage_testcontainers.py --tb=short -q

  vscode:
    name: VS Code Smoke
    needs: changes
    if: needs.changes.outputs.vscode == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock
          cache-suffix: vscode

      - name: Install Python
        run: uv python install 3.14
        working-directory: cli

      - name: Sync CLI dependencies
        run: uv sync --extra dev --frozen
        working-directory: cli

      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode

      - name: Build the smoke harness
        run: npm run build
        working-directory: vscode

      - name: Run VS Code smoke tests
        run: xvfb-run -a npm test
        working-directory: vscode

      - name: Audit VS Code production dependencies
        run: npm audit --omit=dev
        working-directory: vscode
