name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cli

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock

      - name: Install Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format check with ruff
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest --tb=short

      - name: Run ODCS Data Contract CLI lint smoke
        env:
          MODELABLE_DATACONTRACT_CLI: "1"
        run: uv run --with datacontract-cli pytest tests/test_emit_odcs.py --tb=short -q

      - name: Run OpenMetadata Testcontainers smoke
        env:
          MODELABLE_OPENMETADATA_TESTCONTAINERS: "1"
        run: uv run pytest tests/test_openmetadata_testcontainers.py --tb=short -q

  vscode:
    name: VS Code Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock

      - name: Install Python
        run: uv python install 3.14
        working-directory: cli

      - name: Sync CLI dependencies
        run: uv sync --extra dev --frozen
        working-directory: cli

      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode

      - name: Build the smoke harness
        run: npm run build
        working-directory: vscode

      - name: Run VS Code smoke tests
        run: xvfb-run -a npm test
        working-directory: vscode
