name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Use GitHub private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: Modelable version
      placeholder: Output of modelable --version
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected behavior and the smallest useful reproduction.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, installation method, and relevant editor version.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or diagnostics
      render: text
