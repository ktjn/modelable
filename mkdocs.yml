site_name: Modelable
site_url: https://ktjn.github.io/modelable/
repo_url: https://github.com/ktjn/modelable
repo_name: ktjn/modelable
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - toc.follow

nav:
  - Home: README.md
  - Getting Started: getting-started.md
  - Language Reference: language-reference.md
  - Tooling Reference: cli-reference.md
  - Compiler Reference: compiler-reference.md
  - Integrations: integrations.md
  - Supercargo Comparison: comparison-supercargo.md
  - Architecture: architecture.md
  - Maintainer Guide: maintainers.md
